<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDL Autonomous Factory – Build Dashboard</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #0f0; margin: 2rem; }
        .container { max-width: 1200px; margin: auto; }
        .project-selector { margin-bottom: 2rem; }
        button { background: #0a0; color: #000; border: none; padding: 0.5rem 1rem; cursor: pointer; }
        button:disabled { background: #333; cursor: not-allowed; }
        pre { background: #111; padding: 1rem; overflow-x: auto; border: 1px solid #0f0; }
        .status { margin-top: 1rem; padding: 0.5rem; background: #111; border-left: 4px solid #0f0; }
        .error { border-left-color: #f00; color: #f66; }
        .logs { margin-top: 2rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏭 MDL Autonomous Factory – Build Dashboard</h1>
    <div class="project-selector">
        <label for="project">Project: </label>
        <select id="project">
            <option value="evidentia">Evidentia (Legal Reasoning System)</option>
            <option value="paios">PAIOS (Personal AI OS)</option>
        </select>
        <button id="buildBtn">▶ Build Selected Project</button>
    </div>
    <div id="buildStatus" class="status">Ready. Select a project and click Build.</div>
    <div class="logs">
        <h3>Build Logs</h3>
        <pre id="buildLogs">(No build started yet)</pre>
    </div>
</div>
<script>
    const buildBtn = document.getElementById('buildBtn');
    const projectSelect = document.getElementById('project');
    const statusDiv = document.getElementById('buildStatus');
    const logsPre = document.getElementById('buildLogs');

    async function triggerBuild(project) {
        buildBtn.disabled = true;
        statusDiv.innerHTML = `⏳ Triggering build for ${project}...`;
        statusDiv.classList.remove('error');
        logsPre.innerText = 'Waiting for build response...';

        try {
            const response = await fetch(`/api/build/${project}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            if (!response.ok || data.returncode !== 0) {
                throw new Error(data.stderr || data.error || `Build failed with code ${data.returncode}`);
            }
            statusDiv.innerHTML = `✅ Build completed for ${project} (returncode ${data.returncode})`;
            logsPre.innerText = data.stdout || '(No stdout)';
            if (data.stderr) logsPre.innerText += '\n--- STDERR ---\n' + data.stderr;
        } catch (err) {
            statusDiv.innerHTML = `❌ Build error: ${err.message}`;
            statusDiv.classList.add('error');
            logsPre.innerText = err.stack || err.message;
        } finally {
            buildBtn.disabled = false;
        }
    }

    buildBtn.addEventListener('click', () => {
        const project = projectSelect.value;
        triggerBuild(project);
    });
</script>
</body>
</html>
