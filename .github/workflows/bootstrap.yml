name: Meta Build System

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Install dependencies (safe even if empty)
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn

      # 4. Run controller (THIS IS THE FIX)
      - name: Run controller
        run: python -m iteration.controller
