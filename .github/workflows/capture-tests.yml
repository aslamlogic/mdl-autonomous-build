name: Capture-tests-and-logs
on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 3 * * *' # nightly run (optional)
jobs:
  test-and-capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests via capture sink (captures failures to logs/errors.log)
        run: |
          python capture_sink.py run --component tests --severity high -- pytest -q
        continue-on-error: true

      - name: Show last error lines (for quick debug)
        run: tail -n 50 logs/errors.log || true

      - name: Upload logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: capture-logs-${{ github.run_id }}
          path: logs/
