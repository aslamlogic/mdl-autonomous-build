<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MDL Factory - FIS Nexus v2.2</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .nexus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #161b22; border: 1px solid var(--border); padding: 20px; border-radius: 6px; }
        #drop-zone { border: 2px dashed var(--accent); height: 150px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-align: center; }
        #log { margin-top: 20px; background: #010409; padding: 15px; height: 250px; overflow-y: auto; font-family: monospace; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <h2>MDL Autonomous Factory <span style="font-size:12px; color:var(--accent);">SST v2.2 ACTIVE</span></h2>
    <div class="nexus-grid">
        <div class="panel">
            <h3>Manual Input</h3>
            <textarea id="instruction" style="width:100%; height:100px; background:#010409; color:white; border:1px solid var(--border);"></textarea>
            <button onclick="runBuild('text')" style="width:100%; margin-top:10px; background:var(--accent); color:black; border:none; padding:10px; cursor:pointer; font-weight:bold;">EXECUTE BUILD</button>
        </div>
        <div class="panel">
            <h3>FIS Nexus Drop Zone</h3>
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">
                DRAG & DROP SPECIFICATION<br>(PDF, DOCX, TXT)
            </div>
            <input type="file" id="file-input" hidden onchange="handleFile(this.files[0])">
        </div>
    </div>
    <div id="log">> System Initialized. Awaiting Ingestion...</div>
    <script>
        async function runBuild(source, file = null) {
            const fd = new FormData();
            const logEl = document.getElementById('log');
            if(file) {
                fd.append('file', file);
                logEl.innerHTML += `<div>[FIS] Ingesting: ${file.name}...</div>`;
            } else {
                fd.append('instruction', document.getElementById('instruction').value);
                logEl.innerHTML += `<div>[TEXT] Sending instruction...</div>`;
            }
            try {
                const res = await fetch('/run', { method: 'POST', body: fd });
                const data = await res.json();
                logEl.innerHTML += `<div style="color:#7ee787">> Response: ${JSON.stringify(data)}</div>`;
            } catch (e) {
                logEl.innerHTML += `<div style="color:#ff7b72">> Error: ${e.message}</div>`;
            }
            logEl.scrollTop = logEl.scrollHeight;
        }
        function handleFile(f) { if(f) runBuild('fis', f); }
    </script>
</body>
</html>
