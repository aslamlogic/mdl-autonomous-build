# render.yaml
# Declarative Render service blueprint for mdl-autonomous-build.
services:
  - type: web
    name: mdl-autonomous-build
    env: python
    plan: starter
    region: oregon
    repo: aslamlogic/mdl-autonomous-build
    branch: main
    buildCommand: >
      python -m pip install --upgrade pip &&
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    startCommand: python -m uvicorn meta_ui.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CAPTURE_SINK_LOG_DIR
        value: "logs"
    autoDeploy: true
    instanceType: starter
    disk: 512
    pullRequestPreviewsEnabled: false
