# render.yaml - authoritative Render blueprint
services:
  - type: web
    name: mdl-autonomous-build
    env: python
    plan: starter
    region: oregon
    repo: aslamlogic/mdl-autonomous-build
    branch: main
    buildCommand: >
      python -m pip install --upgrade pip &&
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    startCommand: ./render-start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CAPTURE_SINK_LOG_DIR
        value: "logs"
    autoDeploy: true
    instanceType: starter
    disk: 512
    pullRequestPreviewsEnabled: false
